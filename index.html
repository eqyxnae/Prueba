<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a7a4a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gasolineras">
<link rel="manifest" href="manifest.json">
<title>Gasolineras Córdoba &amp; Morón</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #1a7a4a;
    --green-light: #e8f5ee;
    --green-dark: #0f5232;
    --amber: #f59e0b;
    --amber-light: #fef3c7;
    --red: #dc2626;
    --red-light: #fee2e2;
    --gray-50: #f9fafb;
    --gray-100: #f3f4f6;
    --gray-200: #e5e7eb;
    --gray-400: #9ca3af;
    --gray-600: #4b5563;
    --gray-800: #1f2937;
    --shadow: 0 1px 3px rgba(0,0,0,0.12);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.1);
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--gray-100);
    color: var(--gray-800);
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* Header */
  .header {
    background: var(--green);
    color: white;
    padding: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .header h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .header-subtitle {
    font-size: 11px;
    opacity: 0.8;
    margin-top: 2px;
  }
  .refresh-btn {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .refresh-btn:active { background: rgba(255,255,255,0.35); }
  .refresh-btn.spinning { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 6px;
  }
  .tab {
    flex: 1;
    padding: 8px 10px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.15s;
    background: rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.7);
  }
  .tab.active {
    background: white;
    color: var(--green-dark);
  }
  .tab .count {
    font-size: 11px;
    font-weight: 400;
    margin-left: 4px;
    opacity: 0.8;
  }

  /* Sort / filter bar */
  .controls {
    background: white;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--gray-200);
  }
  .controls label {
    font-size: 12px;
    color: var(--gray-600);
    white-space: nowrap;
  }
  .sort-select {
    flex: 1;
    padding: 6px 10px;
    border-radius: 8px;
    border: 1px solid var(--gray-200);
    background: var(--gray-50);
    font-size: 13px;
    color: var(--gray-800);
    cursor: pointer;
  }
  .fuel-select {
    padding: 6px 10px;
    border-radius: 8px;
    border: 1px solid var(--gray-200);
    background: var(--gray-50);
    font-size: 13px;
    color: var(--gray-800);
    cursor: pointer;
  }

  /* Summary bar */
  .summary {
    display: flex;
    gap: 8px;
    padding: 10px 16px;
    background: white;
    border-bottom: 1px solid var(--gray-200);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .summary::-webkit-scrollbar { display: none; }
  .summary-card {
    flex-shrink: 0;
    background: var(--gray-50);
    border-radius: 10px;
    padding: 8px 12px;
    min-width: 110px;
    border: 1px solid var(--gray-200);
  }
  .summary-card .sc-label {
    font-size: 10px;
    color: var(--gray-400);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .summary-card .sc-value {
    font-size: 18px;
    font-weight: 700;
    color: var(--green-dark);
    margin-top: 2px;
  }
  .summary-card.best { border-color: var(--green); background: var(--green-light); }
  .summary-card.best .sc-value { color: var(--green); }

  /* Station cards */
  .station-list {
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .station-card {
    background: white;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: var(--shadow);
    border: 1px solid var(--gray-200);
    transition: transform 0.1s;
  }
  .station-card:active { transform: scale(0.99); }
  .station-card.cheapest {
    border-color: var(--green);
    box-shadow: 0 0 0 1px var(--green), var(--shadow-md);
  }
  .station-card.most-expensive { border-color: var(--red); }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 12px 14px 8px;
    gap: 8px;
  }
  .brand-block {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }
  .brand-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
    background: var(--green-light);
    color: var(--green-dark);
    text-align: center;
    line-height: 1.2;
    overflow: hidden;
  }
  .station-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--gray-800);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .station-address {
    font-size: 11px;
    color: var(--gray-400);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .station-schedule {
    font-size: 10px;
    color: var(--gray-400);
    margin-top: 1px;
  }
  .badge-cheapest {
    background: var(--green);
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
    letter-spacing: 0.3px;
  }
  .badge-expensive {
    background: var(--red-light);
    color: var(--red);
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .rank-number {
    font-size: 11px;
    color: var(--gray-400);
    font-weight: 600;
    flex-shrink: 0;
    width: 20px;
    text-align: right;
  }

  /* Price grid */
  .price-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--gray-200);
    border-top: 1px solid var(--gray-200);
  }
  .price-cell {
    background: white;
    padding: 10px 6px;
    text-align: center;
  }
  .price-cell .pc-fuel {
    font-size: 9px;
    color: var(--gray-400);
    text-transform: uppercase;
    letter-spacing: 0.3px;
    margin-bottom: 3px;
  }
  .price-cell .pc-value {
    font-size: 16px;
    font-weight: 700;
    color: var(--gray-800);
  }
  .price-cell .pc-value.highlighted { color: var(--green); }
  .price-cell .pc-value.no-data { font-size: 14px; color: var(--gray-400); font-weight: 400; }
  .price-cell.main-fuel { background: var(--gray-50); }
  .price-cell.main-fuel .pc-value { font-size: 20px; color: var(--green-dark); }
  .price-cell.cheapest-price .pc-value { color: var(--green); }
  .price-cell.expensive-price .pc-value { color: var(--red); }

  /* Loading */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    gap: 16px;
  }
  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--gray-200);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .loading-text { font-size: 14px; color: var(--gray-600); }

  /* Error */
  .error-box {
    margin: 16px;
    padding: 16px;
    background: var(--red-light);
    border-radius: 12px;
    border: 1px solid #fca5a5;
  }
  .error-box p { font-size: 13px; color: #991b1b; margin-bottom: 8px; }
  .error-box button {
    background: var(--red);
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
  }

  /* Empty */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--gray-400);
    font-size: 14px;
  }

  /* Update time */
  .update-time {
    text-align: center;
    font-size: 11px;
    color: var(--gray-400);
    padding: 8px;
  }

  /* Bottom nav-like padding info */
  .footer-note {
    text-align: center;
    font-size: 10px;
    color: var(--gray-400);
    padding: 12px;
    line-height: 1.6;
  }
  .footer-note a { color: var(--green); text-decoration: none; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <h1>⛽ Gasolineras</h1>
      <div class="header-subtitle">Córdoba &amp; Morón de la Frontera</div>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="loadData(true)" title="Actualizar">↻</button>
  </div>
  <div class="tabs">
    <button class="tab active" id="tab-cordoba" onclick="switchCity('cordoba')">
      Córdoba <span class="count" id="count-cordoba"></span>
    </button>
    <button class="tab" id="tab-moron" onclick="switchCity('moron')">
      Morón de la Frontera <span class="count" id="count-moron"></span>
    </button>
  </div>
</div>

<div class="controls">
  <label>Carburante:</label>
  <select class="fuel-select" id="fuelSelect" onchange="renderStations()">
    <option value="Gasoleo A">Gasóleo A</option>
    <option value="Gasolina 95 E5">Gasolina 95</option>
    <option value="Gasolina 98 E5">Gasolina 98</option>
    <option value="Gasoleo Premium">Gasóleo Premium</option>
  </select>
  <label>Orden:</label>
  <select class="sort-select" id="sortSelect" onchange="renderStations()">
    <option value="price-asc">Precio ↑</option>
    <option value="price-desc">Precio ↓</option>
    <option value="name">Nombre</option>
  </select>
</div>

<div id="summaryBar" class="summary" style="display:none"></div>
<div id="updateTime" class="update-time"></div>
<div id="mainContent"></div>

<div class="footer-note">
  Datos oficiales del Ministerio para la Transición Ecológica<br>
  (<a href="https://geoportalgasolineras.es" target="_blank">geoportalgasolineras.es</a>)
</div>

<script>
const CITIES = {
  cordoba: { name: 'Córdoba', id: '14021' },
  moron:   { name: 'Morón de la Frontera', id: '41067' }
};

const BRAND_COLORS = {
  'REPSOL':    { bg: '#fff0e0', color: '#c14b00', text: 'REP' },
  'CEPSA':     { bg: '#e0f0ff', color: '#005a9e', text: 'CEP' },
  'BP':        { bg: '#e0ffe0', color: '#006600', text: 'BP'  },
  'SHELL':     { bg: '#fff8e0', color: '#cc8800', text: 'SHL' },
  'GALP':      { bg: '#ffe8e0', color: '#b03020', text: 'GAL' },
  'CAMPSA':    { bg: '#ffe0e0', color: '#aa0000', text: 'CAM' },
  'PETRONOR':  { bg: '#f0e0ff', color: '#660099', text: 'PNR' },
  'CARREFOUR': { bg: '#e0e8ff', color: '#0033aa', text: 'CAR' },
  'EROSKI':    { bg: '#ffe0f0', color: '#990066', text: 'ERO' },
  'BONPREU':   { bg: '#f0ffe0', color: '#336600', text: 'BON' },
  'OIL!':      { bg: '#fff3e0', color: '#e65100', text: 'OIL' },
  'MEROIL':    { bg: '#e8f5e9', color: '#2e7d32', text: 'MER' },
  'Q8':        { bg: '#e0f7fa', color: '#006064', text: 'Q8'  },
  'DEFAULT':   { bg: '#f0f0f0', color: '#555555', text: '⛽' }
};

let state = {
  city: 'cordoba',
  data: { cordoba: null, moron: null },
  loading: false,
  error: null,
  lastUpdate: null
};

const FUEL_KEYS = {
  'Gasoleo A':      'Precio Gasoleo A',
  'Gasolina 95 E5': 'Precio Gasolina 95 E5',
  'Gasolina 98 E5': 'Precio Gasolina 98 E5',
  'Gasoleo Premium':'Precio Gasoleo Premium'
};
const ALL_FUELS = [
  { key: 'Precio Gasoleo A',      label: 'Gasóleo A' },
  { key: 'Precio Gasolina 95 E5', label: '95 E5'     },
  { key: 'Precio Gasolina 98 E5', label: '98 E5'     },
  { key: 'Precio Gasoleo Premium',label: 'G. Prem.'  }
];

function parsePrice(val) {
  if (!val || val.trim() === '') return null;
  return parseFloat(val.replace(',', '.'));
}

async function fetchCity(cityKey) {
  const city = CITIES[cityKey];
  const url = `https://sedeaplicaciones.minetur.gob.es/ServiciosRESTCarburantes/PreciosCarburantes/EstacionesTerrestres/FiltroMunicipio/${city.id}`;
  const resp = await fetch(url, {
    headers: { 'Accept': 'application/json' }
  });
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const json = await resp.json();
  return json.ListaEESSPrecio || [];
}

async function loadData(forceRefresh = false) {
  if (state.loading) return;
  state.loading = true;
  state.error = null;
  document.getElementById('refreshBtn').classList.add('spinning');
  showLoading();

  try {
    const [cordobaData, moronData] = await Promise.all([
      fetchCity('cordoba'),
      fetchCity('moron')
    ]);
    state.data.cordoba = cordobaData;
    state.data.moron = moronData;
    state.lastUpdate = new Date();

    document.getElementById('count-cordoba').textContent = `(${cordobaData.length})`;
    document.getElementById('count-moron').textContent = `(${moronData.length})`;
  } catch (e) {
    state.error = e.message;
  } finally {
    state.loading = false;
    document.getElementById('refreshBtn').classList.remove('spinning');
    renderStations();
  }
}

function switchCity(city) {
  state.city = city;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`tab-${city}`).classList.add('active');
  renderStations();
}

function getBrandInfo(rotulo) {
  if (!rotulo) return BRAND_COLORS.DEFAULT;
  const upper = rotulo.toUpperCase();
  for (const [brand, info] of Object.entries(BRAND_COLORS)) {
    if (brand !== 'DEFAULT' && upper.includes(brand)) return info;
  }
  return { ...BRAND_COLORS.DEFAULT, text: rotulo.substring(0, 3).toUpperCase() };
}

function renderStations() {
  const stations = state.data[state.city];
  const content = document.getElementById('mainContent');
  const summary = document.getElementById('summaryBar');
  const updateTime = document.getElementById('updateTime');

  if (!stations) {
    summary.style.display = 'none';
    content.innerHTML = '<div class="loading"><div class="spinner"></div><div class="loading-text">Cargando datos...</div></div>';
    return;
  }

  if (state.error) {
    summary.style.display = 'none';
    content.innerHTML = `<div class="error-box"><p>⚠️ Error al cargar datos: ${state.error}</p><button onclick="loadData(true)">Reintentar</button></div>`;
    return;
  }

  const selectedFuelLabel = document.getElementById('fuelSelect').value;
  const selectedFuelKey = FUEL_KEYS[selectedFuelLabel];
  const sortMode = document.getElementById('sortSelect').value;

  // Filter stations that have the selected fuel
  let filtered = stations.filter(s => parsePrice(s[selectedFuelKey]) !== null);

  // Sort
  if (sortMode === 'price-asc') {
    filtered.sort((a, b) => parsePrice(a[selectedFuelKey]) - parsePrice(b[selectedFuelKey]));
  } else if (sortMode === 'price-desc') {
    filtered.sort((a, b) => parsePrice(b[selectedFuelKey]) - parsePrice(a[selectedFuelKey]));
  } else {
    filtered.sort((a, b) => (a['Rótulo'] || '').localeCompare(b['Rótulo'] || ''));
  }

  const prices = filtered.map(s => parsePrice(s[selectedFuelKey])).filter(Boolean);
  const minPrice = prices.length ? Math.min(...prices) : null;
  const maxPrice = prices.length ? Math.max(...prices) : null;
  const avgPrice = prices.length ? prices.reduce((a,b) => a+b, 0) / prices.length : null;

  // Summary bar
  if (prices.length > 0) {
    summary.style.display = 'flex';
    summary.innerHTML = `
      <div class="summary-card best">
        <div class="sc-label">Mínimo</div>
        <div class="sc-value">${minPrice.toFixed(3)} €</div>
      </div>
      <div class="summary-card">
        <div class="sc-label">Promedio</div>
        <div class="sc-value">${avgPrice.toFixed(3)} €</div>
      </div>
      <div class="summary-card">
        <div class="sc-label">Máximo</div>
        <div class="sc-value" style="color:#dc2626">${maxPrice.toFixed(3)} €</div>
      </div>
      <div class="summary-card">
        <div class="sc-label">Gasolineras</div>
        <div class="sc-value">${filtered.length}</div>
      </div>
    `;
  } else {
    summary.style.display = 'none';
  }

  // Update time
  if (state.lastUpdate) {
    updateTime.textContent = `Actualizado: ${state.lastUpdate.toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'})}`;
  }

  if (filtered.length === 0) {
    content.innerHTML = `<div class="empty">No hay gasolineras con ${selectedFuelLabel} en ${CITIES[state.city].name}</div>`;
    return;
  }

  const cards = filtered.map((s, idx) => {
    const price = parsePrice(s[selectedFuelKey]);
    const isCheapest = price === minPrice;
    const isExpensive = price === maxPrice && maxPrice !== minPrice;
    const brand = getBrandInfo(s['Rótulo']);

    const otherFuels = ALL_FUELS.filter(f => f.key !== selectedFuelKey);
    const fuelCells = otherFuels.map(f => {
      const p = parsePrice(s[f.key]);
      return `<div class="price-cell">
        <div class="pc-fuel">${f.label}</div>
        <div class="pc-value ${p ? '' : 'no-data'}">${p ? p.toFixed(3) + ' €' : '—'}</div>
      </div>`;
    }).join('');

    const mainCell = `<div class="price-cell main-fuel" style="background:${isCheapest ? '#e8f5ee' : isExpensive ? '#fee2e2' : '#f9fafb'}">
      <div class="pc-fuel">${selectedFuelLabel}</div>
      <div class="pc-value" style="color:${isCheapest ? '#1a7a4a' : isExpensive ? '#dc2626' : '#1f2937'}">${price.toFixed(3)} €</div>
    </div>`;

    return `<div class="station-card ${isCheapest ? 'cheapest' : ''} ${isExpensive ? 'most-expensive' : ''}">
      <div class="card-header">
        <div class="brand-block">
          <div class="brand-icon" style="background:${brand.bg};color:${brand.color}">${brand.text}</div>
          <div style="min-width:0">
            <div class="station-name">${s['Rótulo'] || 'Sin nombre'}</div>
            <div class="station-address">${s['Dirección'] || ''}</div>
            <div class="station-schedule">${s['Horario'] ? '🕐 ' + s['Horario'].substring(0, 30) + (s['Horario'].length > 30 ? '…' : '') : ''}</div>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
          <span class="rank-number">#${idx + 1}</span>
          ${isCheapest ? '<span class="badge-cheapest">+ BARATA</span>' : ''}
          ${isExpensive ? '<span class="badge-expensive">+ CARA</span>' : ''}
        </div>
      </div>
      <div class="price-grid">
        ${mainCell}
        ${fuelCells}
      </div>
    </div>`;
  });

  content.innerHTML = `<div class="station-list">${cards.join('')}</div>`;
}

function showLoading() {
  document.getElementById('summaryBar').style.display = 'none';
  document.getElementById('mainContent').innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <div class="loading-text">Cargando precios...</div>
    </div>`;
}

// Service Worker registration
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// Load on start
loadData();
</script>
</body>
</html>
